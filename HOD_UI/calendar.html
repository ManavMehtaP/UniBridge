<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — HOD Portal</title>
<link rel="stylesheet" href="shared.css">
<style>
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.cal-header-cell { background:var(--surface-2); padding:10px; text-align:center; font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; }
.cal-cell { background:var(--surface); padding:8px; min-height:90px; cursor:pointer; transition:background .1s; }
.cal-cell:hover { background:var(--primary-light); }
.cal-cell.other-month { background:var(--surface-2); }
.cal-cell.today { background:#EFF6FF; }
.cal-cell .day-num { font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:4px; width:24px; height:24px; display:flex; align-items:center; justify-content:center; border-radius:50%; }
.cal-cell.today .day-num { background:var(--primary); color:white; }
.cal-event { font-size:10px; font-weight:600; padding:2px 6px; border-radius:3px; margin-bottom:2px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; cursor:pointer; }
.ev-holiday { background:#FEE2E2; color:#DC2626; }
.ev-exam { background:#FEF3C7; color:#D97706; }
.ev-cultural { background:#EDE9FE; color:#7C3AED; }
.ev-other { background:#DBEAFE; color:#2563EB; }
.ev-phase { background:#DCFCE7; color:#16A34A; }
.event-sidebar-item { padding:12px; border-left:3px solid; border-radius:0 6px 6px 0; background:var(--surface-2); margin-bottom:8px; cursor:pointer; transition:all .1s; }
.event-sidebar-item:hover { background:var(--bg); }
.upcoming-nav { display:flex; align-items:center; gap:8px; }
.cal-nav-btn { width:32px; height:32px; border-radius:6px; border:1px solid var(--border); background:var(--surface); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:background .15s; }
.cal-nav-btn:hover { background:var(--bg); }
</style>
</head>
<body>
<div class="layout">
  <div id="sidebar-mount"></div>
  <main class="main">
    <div id="topbar-mount"></div>
    <div class="page-content">

      <div class="page-header-row" style="margin-bottom:20px">
        <div>
          <h1 style="font-size:22px;font-weight:700">Academic Calendar</h1>
          <p style="color:var(--text-secondary);font-size:13px;margin-top:2px">Manage holidays, exam dates, phase timelines, and events</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary" onclick="showToast('Calendar exported as PDF','success')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export PDF
          </button>
          <button class="btn btn-primary" onclick="openModal('add-event-modal')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Event
          </button>
        </div>
      </div>

      <!-- Legend + month nav -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <div class="upcoming-nav">
          <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
          <div id="month-label" style="font-size:16px;font-weight:700;min-width:140px;text-align:center"></div>
          <button class="cal-nav-btn" onclick="nextMonth()">›</button>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-left:auto">
          <span class="badge ev-holiday">Holiday</span>
          <span class="badge ev-exam">Exam</span>
          <span class="badge ev-phase">Phase End</span>
          <span class="badge ev-cultural">Cultural</span>
          <span class="badge ev-other">Other</span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 280px;gap:20px">
        <!-- CALENDAR -->
        <div>
          <div class="cal-grid" id="calendar"></div>
        </div>

        <!-- SIDEBAR -->
        <div>
          <div class="card" style="margin-bottom:16px">
            <div class="card-title">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Upcoming Events
            </div>
            <div id="upcoming-events"></div>
          </div>

          <div class="card">
            <div class="card-title">
              Phase Timeline — Sem 3
            </div>
            <div id="phase-timeline"></div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Add Event Modal -->
<div class="modal-backdrop" id="add-event-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Calendar Event</h3>
      <button class="modal-close" onclick="closeModal('add-event-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Event Title</label>
        <input class="form-control" id="ev-title" placeholder="e.g. Diwali Holiday">
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Start Date</label>
          <input class="form-control" type="date" id="ev-start" value="2026-07-01">
        </div>
        <div class="form-group">
          <label class="form-label">End Date</label>
          <input class="form-control" type="date" id="ev-end" value="2026-07-01">
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Event Type</label>
          <select class="form-control" id="ev-type">
            <option value="holiday">Holiday</option>
            <option value="exam">Exam</option>
            <option value="cultural">Cultural</option>
            <option value="phase">Phase End</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Visible To</label>
          <select class="form-control">
            <option>All (HOD + Faculty + Students)</option>
            <option>Faculty & HOD only</option>
            <option>HOD only</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description (optional)</label>
        <textarea class="form-control" rows="2" placeholder="Additional details…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('add-event-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addEvent()">Add Event</button>
    </div>
  </div>
</div>

<!-- Event Detail Modal -->
<div class="modal-backdrop" id="event-detail-modal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h3 id="ev-detail-title">Event</h3>
      <button class="modal-close" onclick="closeModal('event-detail-modal')">✕</button>
    </div>
    <div class="modal-body" id="ev-detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="closeModal('event-detail-modal');showToast('Event deleted','error')">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal('event-detail-modal')">Close</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="shared.js"></script>
<script>
document.getElementById('sidebar-mount').innerHTML = renderSidebar('calendar');
document.getElementById('topbar-mount').innerHTML = renderTopbar('Calendar');

let currentYear = 2026, currentMonth = 6; // 0-indexed: June = 5 → July = 6

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const EVENTS = [
  {date:'2026-07-04', title:'T3 Phase Start', type:'phase'},
  {date:'2026-07-14', title:'Independence Day', type:'holiday'},
  {date:'2026-07-20', title:'Mid-Sem Fest', type:'cultural'},
  {date:'2026-08-01', title:'T3 Exam', type:'exam'},
  {date:'2026-08-15', title:'Independence Day', type:'holiday'},
  {date:'2026-08-20', title:'T3 Phase End', type:'phase'},
  {date:'2026-09-01', title:'T4 Phase Start', type:'phase'},
  {date:'2026-09-05', title:"Teacher's Day", type:'cultural'},
  {date:'2026-09-25', title:'T4 Exam', type:'exam'},
  {date:'2026-10-02', title:'Gandhi Jayanti', type:'holiday'},
  {date:'2026-10-15', title:'Sem 3 Ends', type:'phase'},
  {date:'2026-07-07', title:'Guest Lecture - AI', type:'other'},
];

const typeConfig = {
  holiday:{cls:'ev-holiday', color:'#DC2626', label:'Holiday'},
  exam:{cls:'ev-exam', color:'#D97706', label:'Exam'},
  cultural:{cls:'ev-cultural', color:'#7C3AED', label:'Cultural'},
  other:{cls:'ev-other', color:'#2563EB', label:'Other'},
  phase:{cls:'ev-phase', color:'#16A34A', label:'Phase'},
};

function getEventsForDate(y, m, d) {
  const str = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return EVENTS.filter(e=>e.date===str);
}

function renderCalendar() {
  document.getElementById('month-label').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();
  const today = new Date();

  let html = DAYS.map(d=>`<div class="cal-header-cell">${d}</div>`).join('');

  // Prev month overflow
  for (let i=0; i<firstDay; i++) {
    html += `<div class="cal-cell other-month"><div class="day-num">${daysInPrev-firstDay+i+1}</div></div>`;
  }

  for (let d=1; d<=daysInMonth; d++) {
    const isToday = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===d;
    const evs = getEventsForDate(currentYear, currentMonth, d);
    const evHtml = evs.slice(0,2).map(e=>`<div class="cal-event ${typeConfig[e.type]?.cls}" onclick="showEventDetail('${e.date}','${e.title}','${e.type}');event.stopPropagation()">${e.title}</div>`).join('');
    const moreHtml = evs.length>2 ? `<div style="font-size:10px;color:var(--primary);margin-top:1px">+${evs.length-2} more</div>` : '';
    html += `<div class="cal-cell${isToday?' today':''}" onclick="openAddOnDate('${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}')"><div class="day-num">${d}</div>${evHtml}${moreHtml}</div>`;
  }

  // Next month fill
  const total = firstDay + daysInMonth;
  const remaining = total%7===0?0:7-(total%7);
  for (let i=1; i<=remaining; i++) html += `<div class="cal-cell other-month"><div class="day-num">${i}</div></div>`;

  document.getElementById('calendar').innerHTML = html;
}

function renderUpcoming() {
  const now = new Date();
  const upcoming = EVENTS
    .filter(e=>new Date(e.date) >= now)
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .slice(0,6);
  document.getElementById('upcoming-events').innerHTML = upcoming.map(e=>{
    const d = new Date(e.date);
    const cfg = typeConfig[e.type];
    return `<div class="event-sidebar-item" style="border-color:${cfg.color}" onclick="showEventDetail('${e.date}','${e.title}','${e.type}')">
      <div style="font-size:13px;font-weight:500">${e.title}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
      <span class="badge ${cfg.cls}" style="margin-top:5px">${cfg.label}</span>
    </div>`;
  }).join('') || '<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:20px">No upcoming events</div>';
}

function renderPhaseTimeline() {
  const phases = [
    {label:'T1',start:'Feb 1',end:'Mar 15',exam:'Mar 20',done:true},
    {label:'T2',start:'Mar 21',end:'May 10',exam:'May 15',done:true},
    {label:'T3',start:'Jul 4',end:'Aug 20',exam:'Aug 25',done:false},
    {label:'T4',start:'Sep 1',end:'Oct 15',exam:'Oct 20',done:false},
  ];
  document.getElementById('phase-timeline').innerHTML = phases.map(p=>`
    <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)">
      <div style="width:28px;height:28px;border-radius:6px;background:${p.done?'var(--success-light)':'var(--bg)'};border:1px solid ${p.done?'var(--success)':'var(--border)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${p.done?'var(--success)':'var(--text-muted)'};flex-shrink:0">${p.label}</div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:500">${p.start} → ${p.end}</div>
        <div style="font-size:11px;color:var(--text-muted)">Exam: ${p.exam}</div>
      </div>
      <span class="badge ${p.done?'badge-success':'badge-neutral'}">${p.done?'Done':'Upcoming'}</span>
    </div>
  `).join('');
}

function prevMonth() {
  currentMonth--;
  if (currentMonth<0) { currentMonth=11; currentYear--; }
  renderCalendar();
}
function nextMonth() {
  currentMonth++;
  if (currentMonth>11) { currentMonth=0; currentYear++; }
  renderCalendar();
}

function openAddOnDate(date) {
  document.getElementById('ev-start').value = date;
  document.getElementById('ev-end').value = date;
  openModal('add-event-modal');
}

function showEventDetail(date, title, type) {
  const d = new Date(date);
  const cfg = typeConfig[type];
  document.getElementById('ev-detail-title').textContent = title;
  document.getElementById('ev-detail-body').innerHTML = `
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="width:48px;height:48px;border-radius:10px;background:${cfg.color}20;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">
        ${{holiday:'🏖️',exam:'📝',cultural:'🎭',phase:'📊',other:'📌'}[type]}
      </div>
      <div>
        <div style="font-size:16px;font-weight:700">${title}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:3px">${d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
        <span class="badge ${cfg.cls}" style="margin-top:8px">${cfg.label}</span>
      </div>
    </div>
  `;
  openModal('event-detail-modal');
}

function addEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const start = document.getElementById('ev-start').value;
  const type = document.getElementById('ev-type').value;
  if (!title || !start) { showToast('Please fill in title and date','error'); return; }
  EVENTS.push({date:start, title, type});
  closeModal('add-event-modal');
  renderCalendar();
  renderUpcoming();
  showToast(`Event "${title}" added to calendar`, 'success');
  document.getElementById('ev-title').value = '';
}

renderCalendar();
renderUpcoming();
renderPhaseTimeline();
</script>
</body>
</html>
